<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Albany Region Address Finder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Leaflet CSS. If this does not load, tiles will appear scattered/misaligned. -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Tabler Icons — used for the copy button icon -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="title-row">
      <h1>Address Finder</h1>
      <span class="region-label">Albany region</span>
    </div>

    <form id="search-form" class="search-row">
      <label for="address-input" class="visually-hidden">Search address or place</label>
      <input id="address-input" type="search" placeholder="Search address, e.g. 29 British American Blvd, Latham, NY 12210" autocomplete="off" />
      <button type="submit">Search</button>
      <button type="button" id="reset-button">Reset</button>
    </form>

    <!-- FIX 3: Result panel now contains two sub-elements rendered by JS:
         .result-primary for the jurisdiction answer
         .result-address for the echoed search query
         The copy button is shown/hidden by JS after a successful lookup. -->
    <section id="result-panel" class="result-panel" aria-live="polite">
      <span id="result-text">Search for an address to identify the municipality and county.</span>
      <button type="button" id="copy-button" aria-label="Copy result to clipboard">
        <i class="ti ti-copy" aria-hidden="true"></i> Copy
      </button>
    </section>
  </header>

  <main>
    <div id="map"></div>
  </main>

  <footer class="app-footer">
    <span>Boundary data from U.S. Census Bureau TIGER/Line files. For newsroom reference only; not a legal boundary determination.</span>
    <span>Map tiles &copy; OpenStreetMap contributors &copy; CARTO</span>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@7/turf.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
